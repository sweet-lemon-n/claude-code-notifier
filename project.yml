name: ClaudeNotifier
options:
  bundleIdPrefix: com.sweetlemon
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: Sources/ClaudeNotifier/App/Info.plist
targets:
  ClaudeNotifier:
    type: application
    platform: macOS
    sources:
      - path: Sources/ClaudeNotifier
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sweetlemon.ClaudeNotifier
        PRODUCT_NAME: ClaudeNotifier
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSUIElement: "YES"
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT License"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
